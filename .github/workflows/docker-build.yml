name: Build and Push Container Image

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9].*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag (e.g., 20260307.1) - leave blank for :latest only'
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Multi-Arch Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION:-latest}"

      - name: Syntax check Perl modules
        run: |
          echo "Checking Perl syntax on all modules..."
          FAILED=0
          for f in modules/pb-* modules/pm-* modules/mw-*; do
            if ! perl -c "$f" 2>/dev/null; then
              echo "[FAIL] $f"
              perl -c "$f" 2>&1
              FAILED=1
            fi
          done
          for f in sbin/photonbbs-client sbin/photonmud sbin/photonmud-generator \
                   sbin/photonbbs-dooredit sbin/useredit sbin/bulledit; do
            if [ -f "$f" ]; then
              if ! perl -c "$f" 2>/dev/null; then
                echo "[FAIL] $f"
                perl -c "$f" 2>&1
                FAILED=1
              fi
            fi
          done
          if [ $FAILED -eq 1 ]; then
            echo "[FAIL] Syntax checks failed"
            exit 1
          fi
          echo "[OK] All syntax checks passed"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.VERSION }},enable=${{ steps.version.outputs.VERSION != '' }}
            type=sha,prefix=sha-

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate image summary
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          echo "## PhotonBBS Container Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`$IMAGE_REF\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$IMAGE_TAGS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Architectures:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick Start" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker volume create appdata" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d --name photonbbs \\" >> $GITHUB_STEP_SUMMARY
          echo "  --privileged \\" >> $GITHUB_STEP_SUMMARY
          echo "  -p 23:23 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -v appdata:/appdata:rw \\" >> $GITHUB_STEP_SUMMARY
          echo "  ${IMAGE_REF}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Connect" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "telnet localhost 23" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
